<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索引擎 - 搜索结果</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-main: #222222;
            --text-sub: #70757a;
            --link-color: #1a0dab;
            --border-color: #dfe1e5;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            padding: 15px;
        }

        /* 搜索框顶部栏 */
        .search-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f2f2f2;
        }

        .search-box {
            flex: 1;
            display: flex;
            align-items: center;
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 8px 16px;
            box-shadow: 0 1px 6px rgba(32,33,36,0.1);
        }

        .search-input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 14px;
            color: #333;
        }

        .result-stats {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 15px;
        }

        /* 搜索结果列表 */
        .result-item {
            margin-bottom: 24px;
        }

        .result-site {
            font-size: 12px;
            color: #202124;
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .tag {
            background-color: #f1f3f4;
            color: #3c4043;
            font-size: 10px;
            padding: 1px 5px;
            border-radius: 3px;
            margin-left: 6px;
        }

        .result-title {
            font-size: 18px;
            color: var(--link-color);
            text-decoration: none;
            line-height: 1.3;
            display: inline-block;
            margin-bottom: 6px;
        }

        .result-title:hover {
            text-decoration: underline;
        }

        .result-snippet {
            font-size: 13px;
            color: #4d5156;
            line-height: 1.5;
        }

        .snippet-highlight {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <!-- 顶部搜索栏 -->
    <div class="search-header">
        <div class="search-box">
            <input type="text" class="search-input" value="dingshengqgy@127.com" readonly>
        </div>
    </div>

    <div class="result-stats">找到约 1 个相关结果 （用时 0.01 秒）</div>

    <!-- 搜索词条：电子邮箱链接 -->
    <div class="result-item">
        <div class="result-site">
            https://mail.127.com/user/dingshengqgy <span class="tag">电子邮箱</span>
        </div>
        <a href="email_dingshengqgy.html" class="result-title">电子邮箱：dingshengqgy@127.com (秦谷云)</a >
        <div class="result-snippet">
            个人网络邮箱：<span class="snippet-highlight">dingshengqgy@127.com</span>，属于鼎盛实业集团创始人秦谷云的常用历史联系邮箱。
        </div>
    </div>

</body>
</html>
